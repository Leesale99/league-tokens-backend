name: Review — Security & Dependencies

on:
  workflow_call:
    secrets:
      OPENCODE_GO_API_KEY:
        required: true
      GH_TOKEN:
        required: true
    inputs:
      PR_NUMBER:
        required: true
        type: string
      REPO:
        required: true
        type: string
      WORKFLOW_RUN_ID:
        required: true
        type: string

jobs:
  security:
    name: Security & Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      PR_NUMBER: ${{ inputs.PR_NUMBER }}
      REPO: ${{ inputs.REPO }}
      WORKFLOW_RUN_ID: ${{ inputs.WORKFLOW_RUN_ID }}
      OPENCODE_PERMISSION: >-
        {"bash": { "*": "deny", "git diff*": "allow", "git log*": "allow", "gh pr diff*": "allow",
        "gh pr view*": "allow", "gh pr comment*": "allow", "gh api*": "allow"}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Go skills
        run: |
          for i in 1 2 3; do
            npx skills add https://github.com/samber/cc-skills-golang -a opencode \
              --skill golang-security \
              --skill golang-dependency-management \
              -y --copy && break
            sleep 10
          done

      - name: Configure git
        run: |
          git config --global user.email "opencode[bot]@users.noreply.github.com"
          git config --global user.name "opencode[bot]"

      - uses: anomalyco/opencode/github@latest
        with:
          model: opencode/deepseek-v4-pro
          use_github_token: true
          prompt: |
            REPO: $REPO
            PR NUMBER: $PR_NUMBER

            You are a senior Go security engineer performing a focused security and dependency review.

            Review this pull request.
            - Use the tool capabilities to attach comments directly to the relevant line numbers.
              - DO NOT use individual inline commenting tools or individual comment endpoints.
              - You MUST batch all of your inline suggestions into a single GitHub Pull Request Review payload.
              - set the 'event' field to "COMMENT"
              - Use suggestions tool when the fix is a direct 1:1 replacement.
            - Also write a short overall summary to a file named security-review-summary.md.
            - Post nothing else. No chat output.

            ## Scope — apply these skill guidelines

            - **Security** — injection, auth, crypto misuse, sensitive data exposure, input validation (Skill("golang-security")).
            - **Dependencies** — new imports, CVE history, abandoned packages, `replace` directives (Skill("golang-dependency-management")).

            ## Priority — blocking-first

            Security issues and supply-chain risks must be flagged before style or quality concerns.
            A single unvalidated input or a weak PRNG can open a critical vulnerability.

            ## How to report

            Every comment must:
            1. Name the vulnerability class (SQL injection, path traversal, weak randomness, etc.)
            2. Explain the attack vector and realistic impact
            3. Provide a concrete, safe alternative

            Write short, concise comments. Only comment when there is a specific issue. Do not praise
            the good stuff. Before posting, verify the point was not already raised.

            Note: the PR branch is already checked out in the current working directory.

            Check project guidelines: @./AGENTS.md
            Check project context: @./CONTEXT.md
            Check agents guidelines: @/docs/agents/domain.md

            Label each comment with its severity:
            - 🔴 **BLOCKING** — exploitable vulnerability or high-risk dependency; must be fixed before merge.
            - 🟠 **IMPORTANT** — significant risk that requires specific conditions.
            - 🟡 **SUGGESTION** — defense-in-depth improvement; optional but worthwhile.

      - name: Post sticky summary comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "<!-- opencode-review-security -->"
          path: security-review-summary.md
