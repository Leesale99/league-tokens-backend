name: Go Code Review (OpenCode)

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  issues: read
  pull-requests: write
  actions: read

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Review — Quality
    if: ${{ github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    uses: ./.github/workflows/review-quality.yml
    with:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  correctness:
    name: Review — Correctness
    if: ${{ github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    uses: ./.github/workflows/review-correctness.yml
    with:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Review — Security & Dependencies
    if: ${{ github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    uses: ./.github/workflows/review-security.yml
    with:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-diagnosis:
    name: Review — CI Failure Diagnosis
    needs: [quality, correctness, security, quality-depth]
    if: ${{ always() && github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          if echo '${{ toJSON(needs) }}' | grep -q '\"result\":\"failure\"'; then
            echo "One or more review jobs failed. Check the job logs above."
            exit 1
          fi

  quality-depth:
    name: Review — Tests, Performance & Observability
    if: ${{ github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    uses: ./.github/workflows/review-quality-depth.yml
    with:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
