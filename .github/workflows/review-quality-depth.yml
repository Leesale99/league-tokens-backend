name: Review — Tests, Performance & Observability

on:
  workflow_call:
    secrets:
      OPENCODE_GO_API_KEY:
        required: true
      GH_TOKEN:
        required: true
    inputs:
      PR_NUMBER:
        required: true
        type: string
      REPO:
        required: true
        type: string
      WORKFLOW_RUN_ID:
        required: true
        type: string

jobs:
  quality-depth:
    name: Tests, Performance & Observability Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      PR_NUMBER: ${{ inputs.PR_NUMBER }}
      REPO: ${{ inputs.REPO }}
      WORKFLOW_RUN_ID: ${{ inputs.WORKFLOW_RUN_ID }}
      OPENCODE_PERMISSION: >-
        {"bash": { "*": "deny", "git diff*": "allow", "git log*": "allow", "gh pr diff*": "allow",
        "gh pr view*": "allow", "gh pr comment*": "allow", "gh api*": "allow"}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Go skills
        run: |
          for i in 1 2 3; do
            npx skills add https://github.com/samber/cc-skills-golang -a opencode \
              --skill golang-testing \
              --skill golang-performance \
              --skill golang-observability \
              --skill golang-modernize \
              -y --copy && break
            sleep 10
          done

      - name: Configure git
        run: |
          git config --global user.email "opencode[bot]@users.noreply.github.com"
          git config --global user.name "opencode[bot]"

      - uses: anomalyco/opencode/github@latest
        with:
          model: 'opencode-go/deepseek-v4-pro'
          use_github_token: true
          prompt: |
            REPO: $REPO
            PR NUMBER: $PR_NUMBER

            You are a senior Go engineer reviewing for test coverage, performance, observability,
            and code modernization.

            Review this pull request.
            - Use the tool capabilities to attach comments directly to the relevant line numbers.
              - DO NOT use individual inline commenting tools or individual comment endpoints.
              - You MUST batch all of your inline suggestions into a single GitHub Pull Request Review payload.
              - set the 'event' field to "COMMENT"
              - Use suggestions tool when the fix is a direct 1:1 replacement.
            - Also write a short overall summary to a file named quality-depth-review-summary.md.
            - Post nothing else. No chat output.

            ## Scope — apply these skill guidelines

            - **Tests** — coverage of new code, test quality, table-driven tests, use of t.Helper() (Skill("golang-testing")).
            - **Performance** — unnecessary allocations, inefficient data structures, missing bounds (Skill("golang-performance")).
            - **Observability** — logging, metrics, tracing added for new code paths (Skill("golang-observability")).
            - **Modernize code** — outdated patterns replaced with Go 1.21+ idioms (Skill("golang-modernize")).

            ## Priority

            - **Tests** and **Performance** are important — flag missing coverage on new exported paths
              and obvious allocation hot-spots on critical paths.
            - **Observability** and **Modernize** are suggestion-first — raise only when the gap is
              material or the pattern is clearly outdated.

            ## How to report

            Every comment must:
            1. Name the specific problem (not just its symptom)
            2. Explain why it matters (undetected regression, latency impact, etc.)
            3. Provide a concrete fix or example

            Write short, concise comments. Only comment when there is a specific issue. Do not praise
            the good stuff. Before posting, verify the point was not already raised.

            Note: the PR branch is already checked out in the current working directory.

            Check project guidelines: @./AGENTS.md
            Check project context: @./CONTEXT.md
            Check agents guidelines: @/docs/agents/domain.md

            Label each comment with its severity:
            - 🟠 **IMPORTANT** — missing test for a critical exported path; allocation hot-spot on a
              latency-sensitive path.
            - 🟡 **SUGGESTION** — observability gap, modernization opportunity, minor test improvement.

      - name: Post sticky summary comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "<!-- opencode-review-quality-depth -->"
          path: quality-depth-review-summary.md
