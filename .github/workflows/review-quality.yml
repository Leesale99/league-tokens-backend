name: Review — Quality

on:
  workflow_call:
    secrets:
      OPENROUTER_API_KEY:
        required: true
      GH_TOKEN:
        required: true
    inputs:
      PR_NUMBER:
        required: true
        type: string
      REPO:
        required: true
        type: string
      WORKFLOW_RUN_ID:
        required: true
        type: string

jobs:
  quality:
    name: Code Quality Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      PR_NUMBER: ${{ inputs.PR_NUMBER }}
      REPO: ${{ inputs.REPO }}
      WORKFLOW_RUN_ID: ${{ inputs.WORKFLOW_RUN_ID }}
      OPENCODE_PERMISSION: >-
        {"bash": { "*": "deny", "git diff*": "allow", "git log*": "allow", "gh pr diff*": "allow",
        "gh pr view*": "allow", "gh pr comment*": "allow", "gh api*": "allow"}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Go skills
        run: |
          for i in 1 2 3; do
            npx skills add https://github.com/samber/cc-skills-golang -a opencode \
              --skill golang-code-style \
              --skill golang-naming \
              --skill golang-documentation \
              -y --copy && break
            sleep 10
          done

      - name: Configure git
        run: |
          git config --global user.email "opencode[bot]@users.noreply.github.com"
          git config --global user.name "opencode[bot]"

      - uses: anomalyco/opencode/github@latest
        with:
          model: opencode-go/deepseek-v4-pro
          use_github_token: true
          prompt: |
            REPO: $REPO
            PR NUMBER: $PR_NUMBER

            You are a senior Go engineer performing a focused code quality review.

            Review this pull request.
            - Use the tool capabilities to attach comments directly to the relevant line numbers.
              - DO NOT use individual inline commenting tools or individual comment endpoints.
              - You MUST batch all of your inline suggestions into a single GitHub Pull Request Review payload.
              - set the 'event' field to "COMMENT"
              - Use suggestions tool when the fix is a direct 1:1 replacement.
            - Also write a short overall summary to a file named quality-review-summary.md.
            - Post nothing else. No chat output.

            ## Scope — apply these skill guidelines

            - **Code style** — formatting, comment quality, idiomatic Go patterns (Skill("golang-code-style")).
            - **Naming** — packages, types, variables, functions, constants (Skill("golang-naming")).
            - **Documentation** — exported symbols, package-level docs, README impact (Skill("golang-documentation")).

            ## Priority — suggestion-first

            These areas reflect style and readability, not correctness. Only raise an issue when it will
            confuse future readers, mislead consumers of an exported API, or make the codebase harder to
            navigate at scale. Do not flag formatting that `gofmt` handles automatically.

            ## How to report

            Every comment must:
            1. Name the specific problem (not just its symptom)
            2. Explain under what conditions it matters or fails
            3. Provide a concrete fix — renamed identifier, corrected code snippet, or safer pattern

            Write short, concise comments. Only comment when there is a specific issue. Do not praise
            the good stuff. Before posting, verify the point was not already raised in a previous
            review comment.

            Note: the PR branch is already checked out in the current working directory.

            Check project guidelines: @./AGENTS.md
            Check project context: @./CONTEXT.md
            Check agents guidelines: @/docs/agents/domain.md

            Label each comment: 🟡 **SUGGESTION**

      - name: Post sticky summary comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "<!-- opencode-review-quality -->"
          path: quality-review-summary.md
